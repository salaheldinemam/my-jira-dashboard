services:
  - type: web
    name: jira-team-insights-dashboard
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ATLASSIAN_CLIENT_ID
        sync: false
      - key: ATLASSIAN_CLIENT_SECRET
        sync: false
      - key: ATLASSIAN_REDIRECT_URI
        sync: false
